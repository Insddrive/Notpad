<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code Notepad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+Gurmukhi:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d2e;
            --card2: #222538;
            --border: #2e3250;
            --accent: #7c6ff7;
            --accent2: #5ce0c4;
            --danger: #ff6b6b;
            --warn: #ffa502;
            --text: #e2e4f0;
            --muted: #6b7094;
            --input-bg: #13162a;
            --header-h: 58px;
            --footer-h: 44px;
        }
        [data-theme="light"] {
            --bg: #f0f2f8;
            --card: #ffffff;
            --card2: #f5f6fc;
            --border: #dde0ef;
            --accent: #5a4fd6;
            --accent2: #00a68a;
            --danger: #e74c3c;
            --warn: #e67e22;
            --text: #1a1d2e;
            --muted: #8089b0;
            --input-bg: #eef0f8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans Gurmukhi', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ─── HEADER ─── */
        .app-header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-title span { font-size: 20px; }
        .header-actions { display: flex; gap: 8px; align-items: center; }

        .icon-btn {
            width: 36px; height: 36px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--card2);
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:active { transform: scale(0.92); }
        .icon-btn.active { border-color: var(--accent); color: var(--accent); }

        /* ─── MAIN CONTENT ─── */
        .main-wrap {
            padding: 14px;
            max-width: 500px;
            margin: 0 auto;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 2px;
        }

        /* ─── FILE ROW ─── */
        .files-wrap { display: flex; flex-direction: column; gap: 10px; }

        .file-row {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            display: grid;
            grid-template-columns: 36px 1fr 80px 36px;
            gap: 8px;
            align-items: center;
            transition: border-color 0.2s, box-shadow 0.2s;
            animation: slideIn 0.3s ease both;
        }
        .file-row:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,111,247,0.12);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-row input {
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 7px;
            padding: 9px 8px;
            font-size: 13px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            width: 100%;
            text-align: center;
            transition: border-color 0.2s;
        }
        .file-row input:focus { border-color: var(--accent); }
        .file-row input::placeholder { color: var(--muted); font-size: 11px; }

        .row-open-btn {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), #9b6ef3);
            border: none;
            border-radius: 9px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(124,111,247,0.35);
        }
        .row-open-btn:active { transform: scale(0.9); }

        .row-del-btn {
            width: 36px; height: 36px;
            background: transparent;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            color: var(--danger);
            font-size: 15px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .row-del-btn:active { background: rgba(255,107,107,0.1); transform: scale(0.9); }

        /* Saved indicator dot */
        .file-row.has-code .row-open-btn::after {
            content: '';
            position: absolute;
            top: 3px; right: 3px;
            width: 7px; height: 7px;
            background: var(--accent2);
            border-radius: 50%;
            border: 1.5px solid var(--card);
        }
        .row-open-btn { position: relative; }

        /* ─── ADD ROW BUTTON ─── */
        .add-row-btn {
            width: 100%;
            padding: 11px;
            background: transparent;
            border: 1.5px dashed var(--border);
            border-radius: 12px;
            color: var(--muted);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            gap: 6px;
            font-family: 'Noto Sans Gurmukhi', sans-serif;
            margin-top: 10px;
        }
        .add-row-btn:active { background: var(--card); color: var(--accent); border-color: var(--accent); }

        /* ─── STATS BAR ─── */
        .stats-bar {
            margin-top: 16px;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            display: flex;
            justify-content: space-around;
        }
        .stat-item { text-align: center; }
        .stat-val { font-size: 20px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

        /* ─── EDITOR MODAL ─── */
        #editorModal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            flex-direction: column;
        }
        #editorModal.open { display: flex; }

        .editor-header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0 12px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .editor-back {
            width: 36px; height: 36px;
            background: var(--card2);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .editor-file-name {
            flex: 1;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .editor-top-btns { display: flex; gap: 6px; flex-shrink: 0; }
        .etb {
            height: 34px; padding: 0 11px;
            border: none; border-radius: 7px;
            font-size: 12px; font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            transition: all 0.15s;
        }
        .etb:active { transform: scale(0.93); }
        .etb-paste { background: #3d3882; color: #b8b0ff; }
        .etb-copy  { background: #1a3d38; color: var(--accent2); }
        .etb-save  { background: var(--accent); color: white; }

        /* ─── EDITOR TOOLBAR (FORMAT HELP) ─── */
        .editor-toolbar {
            background: var(--card2);
            border-bottom: 1px solid var(--border);
            padding: 7px 12px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .editor-toolbar::-webkit-scrollbar { display: none; }
        .tb-chip {
            padding: 5px 10px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 11px;
            color: var(--muted);
            cursor: pointer;
            white-space: nowrap;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .tb-chip:active { background: var(--accent); color: white; border-color: var(--accent); }

        /* ─── TEXTAREA ─── */
        #editorArea {
            flex: 1;
            width: 100%;
            padding: 14px;
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            background: var(--bg);
            color: var(--text);
            resize: none;
            outline: none;
        }

        /* ─── EDITOR FOOTER ─── */
        .editor-footer {
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 0 14px;
            height: var(--footer-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }
        .footer-info { display: flex; gap: 14px; }
        .autosave-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--muted);
            display: inline-block;
            transition: background 0.3s;
        }
        .autosave-dot.saved { background: var(--accent2); }
        .autosave-dot.saving { background: var(--warn); animation: pulse 0.6s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ─── TOAST ─── */
        #toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 13px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transition: all 0.3s;
            z-index: 99999;
            pointer-events: none;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ─── CONFIRM DIALOG ─── */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99998;
            align-items: flex-end;
        }
        .confirm-overlay.open { display: flex; }
        .confirm-sheet {
            background: var(--card);
            width: 100%;
            border-radius: 18px 18px 0 0;
            padding: 20px 20px 30px;
            animation: sheetUp 0.3s ease;
        }
        @keyframes sheetUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .confirm-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
        .confirm-msg { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
        .confirm-btns { display: flex; gap: 10px; }
        .confirm-btns button {
            flex: 1; height: 44px;
            border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600;
            cursor: pointer;
        }
        .confirm-yes { background: var(--danger); color: white; }
        .confirm-no { background: var(--card2); color: var(--text); border: 1.5px solid var(--border) !important; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

<!-- ── APP HEADER ── -->
<div class="app-header">
    <div class="app-title"><span>💻</span> Code Notepad</div>
    <div class="header-actions">
        <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Theme">🌙</button>
        <button class="icon-btn" onclick="exportAll()" title="ਸਭ Export">📤</button>
    </div>
</div>

<!-- ── MAIN ── -->
<div class="main-wrap">
    <div class="section-label" style="margin-top:4px">ਫਾਈਲਾਂ</div>
    <div class="files-wrap" id="filesWrap"></div>

    <button class="add-row-btn" onclick="addRow()">
        <span style="font-size:18px">＋</span> ਨਵੀਂ ਫਾਈਲ ਜੋੜੋ
    </button>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-val" id="statFiles">0</div>
            <div class="stat-lbl">ਫਾਈਲਾਂ</div>
        </div>
        <div class="stat-item">
            <div class="stat-val" id="statFilled">0</div>
            <div class="stat-lbl">ਕੋਡ ਸਹਿਤ</div>
        </div>
        <div class="stat-item">
            <div class="stat-val" id="statChars">0</div>
            <div class="stat-lbl">ਕੁੱਲ ਅੱਖਰ</div>
        </div>
    </div>
</div>

<!-- ── EDITOR MODAL ── -->
<div id="editorModal">
    <div class="editor-header">
        <button class="editor-back" onclick="closeEditor()">‹</button>
        <div class="editor-file-name" id="editorFileName">untitled.txt</div>
        <div class="editor-top-btns">
            <button class="etb etb-paste" onclick="pasteFromClipboard()">📋</button>
            <button class="etb etb-copy" onclick="copyCode()">⧉</button>
            <button class="etb etb-save" onclick="saveFile()">💾 Save</button>
        </div>
    </div>

    <div class="editor-toolbar">
        <div class="tb-chip" onclick="insertSnippet('&lt;!DOCTYPE html&gt;')">DOCTYPE</div>
        <div class="tb-chip" onclick="insertSnippet('&lt;div&gt;&lt;/div&gt;')">&lt;div&gt;</div>
        <div class="tb-chip" onclick="insertSnippet('console.log()')">log()</div>
        <div class="tb-chip" onclick="insertSnippet('function name() {\n  \n}')">function</div>
        <div class="tb-chip" onclick="insertSnippet('if () {\n  \n}')">if</div>
        <div class="tb-chip" onclick="insertSnippet('for (let i = 0; i < ; i++) {\n  \n}')">for</div>
        <div class="tb-chip" onclick="insertSnippet('const  = ')">const</div>
        <div class="tb-chip" onclick="insertSnippet('let  = ')">let</div>
        <div class="tb-chip" onclick="insertSnippet('  ')">Tab</div>
        <div class="tb-chip" onclick="insertSnippet('/* */') ">/* */</div>
    </div>

    <textarea id="editorArea" placeholder="ਇੱਥੇ ਕੋਡ ਲਿਖੋ ਜਾਂ ਪੇਸਟ ਕਰੋ..." spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>

    <div class="editor-footer">
        <div class="footer-info">
            <span id="charCount">0 ਅੱਖਰ</span>
            <span id="lineCount">1 ਲਾਈਨ</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
            <div class="autosave-dot" id="autoDot"></div>
            <span id="autoText">—</span>
        </div>
    </div>
</div>

<!-- ── CONFIRM SHEET ── -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-sheet">
        <div class="confirm-title" id="confirmTitle">ਯਕੀਨ ਕਰੋ</div>
        <div class="confirm-msg" id="confirmMsg">ਕੀ ਤੁਸੀਂ ਜਾਰੀ ਰੱਖਣਾ ਚਾਹੁੰਦੇ ਹੋ?</div>
        <div class="confirm-btns">
            <button class="confirm-yes" id="confirmYes">ਹਾਂ, ਮਿਟਾਓ</button>
            <button class="confirm-no" onclick="closeConfirm()">ਰੱਦ ਕਰੋ</button>
        </div>
    </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let rows = [];       // [{id, name, ext, code}]
let activeId = null;
let autoSaveTimer = null;
let nextId = 1;

const LS = {
    save() { localStorage.setItem('cnp_rows', JSON.stringify(rows)); localStorage.setItem('cnp_nextId', nextId); },
    load() {
        try {
            rows = JSON.parse(localStorage.getItem('cnp_rows') || '[]');
            nextId = parseInt(localStorage.getItem('cnp_nextId') || '1');
        } catch(e) { rows = []; }
    }
};

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
LS.load();

// Migrate old format if needed
if (rows.length === 0) {
    // Try old key format
    let hadOld = false;
    for (let i = 1; i <= 3; i++) {
        const n = localStorage.getItem(`n${i}`) || '';
        const e = localStorage.getItem(`e${i}`) || '';
        if (n || e) {
            rows.push({ id: nextId++, name: n, ext: e, code: '' });
            hadOld = true;
        }
    }
    if (!hadOld) {
        // Default 3 rows
        for (let i = 0; i < 3; i++) rows.push({ id: nextId++, name: '', ext: '', code: '' });
    }
    LS.save();
}

// Theme
if (localStorage.getItem('cnp_theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeBtn').textContent = '☀️';
}

renderAll();

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function renderAll() {
    const wrap = document.getElementById('filesWrap');
    wrap.innerHTML = '';
    rows.forEach((r, idx) => {
        const div = document.createElement('div');
        div.className = 'file-row' + (r.code ? ' has-code' : '');
        div.dataset.id = r.id;
        div.style.animationDelay = (idx * 0.05) + 's';
        div.innerHTML = `
            <button class="row-open-btn" onclick="openEditor(${r.id})">▶</button>
            <input type="text" placeholder="ਨਾਮ" value="${esc(r.name)}"
                oninput="updateField(${r.id},'name',this.value)">
            <input type="text" placeholder="html / js" value="${esc(r.ext)}"
                oninput="updateField(${r.id},'ext',this.value.toLowerCase()); this.value=this.value.toLowerCase()">
            <button class="row-del-btn" onclick="deleteRow(${r.id})">✕</button>
        `;
        wrap.appendChild(div);
    });
    updateStats();
}

function esc(s) { return (s||'').replace(/"/g,'&quot;'); }

function updateField(id, field, val) {
    const r = rows.find(x => x.id === id);
    if (!r) return;
    r[field] = val;
    LS.save();
    updateStats();
}

function updateStats() {
    const filled = rows.filter(r => r.code.trim().length > 0).length;
    const chars = rows.reduce((s, r) => s + r.code.length, 0);
    document.getElementById('statFiles').textContent = rows.length;
    document.getElementById('statFilled').textContent = filled;
    document.getElementById('statChars').textContent = chars > 999 ? (chars/1000).toFixed(1)+'k' : chars;
}

// ════════════════════════════════════════
//  ROW MANAGEMENT
// ════════════════════════════════════════
function addRow() {
    if (rows.length >= 15) { toast('ਵੱਧ ਤੋਂ ਵੱਧ 15 ਫਾਈਲਾਂ'); return; }
    rows.push({ id: nextId++, name: '', ext: '', code: '' });
    LS.save();
    renderAll();
    // Scroll to bottom
    setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 100);
}

function deleteRow(id) {
    const r = rows.find(x => x.id === id);
    const label = r.name || r.ext ? `"${r.name}.${r.ext}"` : 'ਇਸ ਫਾਈਲ';
    showConfirm(
        'ਫਾਈਲ ਮਿਟਾਓ',
        `${label} ਨੂੰ ਮਿਟਾਓਗੇ? ਇਹ ਅਮਲ ਵਾਪਸ ਨਹੀਂ ਹੋਵੇਗਾ।`,
        () => {
            rows = rows.filter(x => x.id !== id);
            LS.save();
            renderAll();
            toast('ਫਾਈਲ ਮਿਟਾ ਦਿੱਤੀ');
        }
    );
}

// ════════════════════════════════════════
//  EDITOR
// ════════════════════════════════════════
function openEditor(id) {
    const r = rows.find(x => x.id === id);
    if (!r) return;
    activeId = id;

    const fname = (r.name || 'untitled') + (r.ext ? '.' + r.ext : '');
    document.getElementById('editorFileName').textContent = fname;
    document.getElementById('editorArea').value = r.code || '';
    updateEditorMeta();

    document.getElementById('editorModal').classList.add('open');
    document.body.style.overflow = 'hidden';
    setAutoSaveStatus('—', false);
}

function closeEditor() {
    // Auto-save on close
    flushAutoSave();
    document.getElementById('editorModal').classList.remove('open');
    document.body.style.overflow = '';
    activeId = null;
    renderAll();
}

// ── Auto-save ──
document.getElementById('editorArea').addEventListener('input', function() {
    updateEditorMeta();
    setAutoSaveStatus('ਸੁਰੱਖਿਅਤ ਕਰ ਰਿਹਾ ਹੈ...', 'saving');
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(flushAutoSave, 1200);
});

function flushAutoSave() {
    if (!activeId) return;
    const r = rows.find(x => x.id === activeId);
    if (!r) return;
    r.code = document.getElementById('editorArea').value;
    LS.save();
    setAutoSaveStatus('ਸੁਰੱਖਿਅਤ ✓', 'saved');
}

function setAutoSaveStatus(text, state) {
    document.getElementById('autoText').textContent = text;
    const dot = document.getElementById('autoDot');
    dot.className = 'autosave-dot' + (state ? ' ' + state : '');
}

function updateEditorMeta() {
    const val = document.getElementById('editorArea').value;
    document.getElementById('charCount').textContent = val.length + ' ਅੱਖਰ';
    document.getElementById('lineCount').textContent = (val.split('\n').length) + ' ਲਾਈਨਾਂ';
}

// ── Toolbar snippets ──
function insertSnippet(text) {
    const ta = document.getElementById('editorArea');
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const before = ta.value.substring(0, start);
    const after = ta.value.substring(end);
    ta.value = before + text + after;
    ta.selectionStart = ta.selectionEnd = start + text.length;
    ta.focus();
    ta.dispatchEvent(new Event('input'));
}

// ── Actions ──
async function pasteFromClipboard() {
    try {
        const text = await navigator.clipboard.readText();
        insertSnippet(text);
        toast('ਕਲਿੱਪਬੋਰਡ ਤੋਂ ਪੇਸਟ ✓');
    } catch {
        toast('ਕਲਿੱਪਬੋਰਡ ਤੱਕ ਪਹੁੰਚ ਨਹੀਂ — ਆਪਣੇ ਆਪ ਪੇਸਟ ਕਰੋ');
    }
}

async function copyCode() {
    const text = document.getElementById('editorArea').value;
    if (!text) { toast('ਕੋਡ ਖਾਲੀ ਹੈ'); return; }
    try {
        await navigator.clipboard.writeText(text);
        toast('ਕੋਡ ਕਾਪੀ ✓');
    } catch {
        toast('ਕਾਪੀ ਨਹੀਂ ਹੋਈ');
    }
}

function saveFile() {
    if (!activeId) return;
    const r = rows.find(x => x.id === activeId);
    if (!r) return;

    // Flush first
    r.code = document.getElementById('editorArea').value;

    let name = r.name.trim();
    let ext = r.ext.trim();

    if (!name) {
        name = prompt('ਫਾਈਲ ਦਾ "ਨਾਮ" ਭਰੋ:');
        if (!name) return;
        r.name = name;
    }
    if (!ext) {
        ext = prompt('ਫਾਈਲ ਦੀ "ਕਿਸਮ" ਭਰੋ (html, js, css...):');
        if (!ext) return;
        r.ext = ext.toLowerCase();
    }

    LS.save();
    const fname = `${r.name}.${r.ext}`;
    document.getElementById('editorFileName').textContent = fname;

    const blob = new Blob([r.code], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    URL.revokeObjectURL(a.href);
    toast(`💾 ${fname} ਡਾਊਨਲੋਡ ਹੋ ਰਹੀ ਹੈ`);
    setAutoSaveStatus('ਸੁਰੱਖਿਅਤ ✓', 'saved');
}

// ─── Export All ───
function exportAll() {
    const filled = rows.filter(r => r.code.trim());
    if (!filled.length) { toast('ਕੋਡ ਵਾਲੀ ਕੋਈ ਫਾਈਲ ਨਹੀਂ'); return; }

    let delay = 0;
    filled.forEach(r => {
        setTimeout(() => {
            const blob = new Blob([r.code], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${r.name || 'untitled'}.${r.ext || 'txt'}`;
            a.click();
            URL.revokeObjectURL(a.href);
        }, delay);
        delay += 600;
    });
    toast(`${filled.length} ਫਾਈਲਾਂ ਐਕਸਪੋਰਟ ਹੋ ਰਹੀਆਂ ਹਨ`);
}

// ════════════════════════════════════════
//  THEME
// ════════════════════════════════════════
function toggleTheme() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
    document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
    localStorage.setItem('cnp_theme', isLight ? 'dark' : 'light');
}

// ════════════════════════════════════════
//  CONFIRM DIALOG
// ════════════════════════════════════════
let _confirmCb = null;
function showConfirm(title, msg, cb) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    _confirmCb = cb;
    document.getElementById('confirmOverlay').classList.add('open');
    document.getElementById('confirmYes').onclick = () => { closeConfirm(); if(_confirmCb) _confirmCb(); };
}
function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('open');
}

// ════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════
let _toastTimer;
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ════════════════════════════════════════
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (activeId) saveFile();
    }
    if (e.key === 'Escape' && activeId) {
        closeEditor();
    }
});

// Back button closes editor on Android
window.addEventListener('popstate', () => {
    if (activeId) { history.pushState(null, '', ''); closeEditor(); }
});
history.pushState(null, '', '');
</script>
